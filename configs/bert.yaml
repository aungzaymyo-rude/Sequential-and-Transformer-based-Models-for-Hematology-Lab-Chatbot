experiment_name: bert_base_uncased
seed: 42
results_dir: results/metrics

data:
  processed_dataset_path: data/processed/intent_dataset.jsonl
  splits_dir: data/splits
  test_size: 0.15
  val_size: 0.15
  language: en

preprocessing:
  lowercase: true
  strip_control_chars: true
  collapse_whitespace: true

model:
  family: transformer
  architecture: bert-base-uncased
  max_length: 128

training:
  epochs: 3
  train_batch_size: 16
  eval_batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.0
  warmup_steps: 0
